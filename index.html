<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rust for Java Experts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;700&display=swap');

  :root {
    --rust:    #CE422B;
    --rust-dim:#8B2E1E;
    --java:    #5382A1;
    --java-dim:#2E5A7E;
    --bg:      #0F0F0F;
    --surface: #181818;
    --surface2:#222222;
    --border:  #2E2E2E;
    --text:    #E8E4DC;
    --muted:   #888;
    --good:    #4CAF50;
    --warn:    #FFC107;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .logo-badge {
    background: var(--rust);
    color: #fff;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 700;
    border-radius: 2px;
  }
  .logo-sep { color: var(--muted); }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .progress-track {
    width: 160px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--rust);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── Nav tabs ── */
  nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 32px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    padding: 14px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  nav button:hover { color: var(--text); }
  nav button.active {
    color: var(--rust);
    border-bottom-color: var(--rust);
  }

  /* ── Layout ── */
  main {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 24px 0;
    overflow-y: auto;
    position: sticky;
    top: 109px;
    height: calc(100vh - 109px);
  }

  .aside-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 20px 10px;
  }

  .topic-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
    line-height: 1.4;
  }
  .topic-btn:hover { background: var(--surface2); color: var(--text); }
  .topic-btn.active {
    color: var(--rust);
    border-left-color: var(--rust);
    background: var(--surface2);
  }
  .topic-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .topic-btn.done .dot { background: var(--good); }
  .topic-btn.active .dot { background: var(--rust); }

  /* ── Content ── */
  .content {
    padding: 40px 48px;
    overflow-y: auto;
    max-width: 960px;
  }

  .lesson-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--rust);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  h1.lesson-title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }

  .lesson-body p {
    font-size: 15px;
    line-height: 1.75;
    color: #C8C4BC;
    margin-bottom: 16px;
  }

  .lesson-body strong { color: var(--text); font-weight: 500; }

  h3.block-heading {
    font-size: 15px;
    font-weight: 700;
    margin: 32px 0 4px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h3.block-heading::before {
    content: "";
    width: 18px;
    height: 2px;
    background: var(--rust);
    flex-shrink: 0;
  }

  /* ── Side-by-side code ── */
  .code-compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 16px 0 24px;
  }
  .code-panel {
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .code-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }
  .code-panel-header.java { background: #0F1C2E; color: var(--java); }
  .code-panel-header.rust { background: #1A0B08; color: var(--rust); }

  pre {
    background: var(--surface2);
    padding: 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.65;
    overflow-x: auto;
    tab-size: 2;
    flex: 1;
  }

  code {
    font-family: var(--mono);
    background: var(--surface2);
    color: #E8834D;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 13px;
  }

  .kw { color: #CC7EE8; }
  .ty { color: #5EB3D3; }
  .fn { color: #E8C567; }
  .st { color: #9ECE6A; }
  .cm { color: #606060; }
  .lt { color: #FF9E64; }
  .nm { color: #FF9E64; }
  .op { color: #89DDFF; }

  /* ── Mapping table ── */
  .map-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .map-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .map-table th:nth-child(1) { color: var(--java); }
  .map-table th:nth-child(2) { color: var(--rust); }
  .map-table th:nth-child(3) { color: var(--muted); }
  .map-table td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.55;
  }
  .map-table tr:last-child td { border-bottom: none; }
  .map-table td:nth-child(1), .map-table td:nth-child(2) { font-family: var(--mono); font-size: 12.5px; white-space: nowrap; }
  .map-table td:nth-child(1) { color: #A8C8E0; }
  .map-table td:nth-child(2) { color: #E8A896; }
  .map-table td:nth-child(3) { color: var(--muted); font-size: 12.5px; }
  .map-table tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

  /* ── Callout boxes ── */
  .callout {
    border-radius: 6px;
    padding: 16px 20px;
    margin: 20px 0;
    border-left: 3px solid;
    font-size: 14px;
    line-height: 1.65;
  }
  .callout.concept { background: #0D1A24; border-color: var(--java); color: #A8C8E0; }
  .callout.insight { background: #1A0E00; border-color: var(--rust); color: #E0C8A0; }
  .callout.danger  { background: #1A0808; border-color: #E53935; color: #F4AAAA; }
  .callout.tip     { background: #0A1A0A; border-color: var(--good); color: #A8D8A8; }
  .callout strong {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
  }
  .callout code { background: rgba(0,0,0,0.35); }

  /* ── Quiz ── */
  .quiz {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin: 28px 0;
  }
  .quiz-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--rust);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .quiz-q { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.5; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    font-family: var(--sans);
    color: var(--text);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--rust); }
  .quiz-opt.correct { border-color: var(--good); background: #0A1A0A; color: #9ECE6A; }
  .quiz-opt.wrong   { border-color: #E53935; background: #1A0808; color: #F4AAAA; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback { margin-top: 14px; font-size: 13px; line-height: 1.6; color: var(--muted); display: none; }
  .quiz-feedback.show { display: block; }

  /* ── Nav buttons ── */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .nav-btn:hover { border-color: var(--rust); }
  .nav-btn.primary { background: var(--rust); border-color: var(--rust); font-weight: 600; }
  .nav-btn.primary:hover { background: var(--rust-dim); border-color: var(--rust-dim); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; }
    aside { display: none; }
    .content { padding: 24px 20px; }
    .code-compare { grid-template-columns: 1fr; }
    h1.lesson-title { font-size: 22px; }
    .map-table td:nth-child(1), .map-table td:nth-child(2) { white-space: normal; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">RUST</span>
    <span class="logo-sep">for</span>
    <span>Java Experts</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <span id="progText"></span>
  </div>
</header>

<nav id="topNav"></nav>

<main>
<aside>
  <div class="aside-label">Topics</div>
  <div id="sidebarTopics"></div>
</aside>

<div class="content" id="contentPane"></div>
</main>

<script>
/* ────────────────────────────────────────────────────────────
   Block types:
   { html }                          – prose paragraph(s)
   { heading }                       – small section heading
   { table: { headers, rows } }      – Java → Rust mapping table
   { compare: { javaLabel, java, rustLabel, rust } }
   { callout: { type, label, text } }
──────────────────────────────────────────────────────────── */

const CATEGORIES = [

/* ═══════════════════════ 1. TYPES & DATA ═══════════════════════ */
{
  name: "Types & Data",
  topics: [

  /* ---- 1.1 Primitives ---- */
  {
    title: "Primitives & Numbers",
    eyebrow: "Types & Data · 1",
    blocks: [
      { html: "<p>Java has 8 primitives plus their boxed wrappers (<code>int</code> / <code>Integer</code>). Rust has <strong>no boxing distinction</strong> — every numeric type is a first-class value that works in generics and collections directly. Rust also adds something Java famously lacks: <strong>unsigned integers</strong>.</p>" },
      { table: {
        headers: ["Java", "Rust", "Notes"],
        rows: [
          ["byte", "i8", "Rust also has u8 (0–255) — the natural type for raw bytes"],
          ["short", "i16", "u16 for unsigned"],
          ["int / Integer", "i32", "Default integer type; no boxed/unboxed split"],
          ["long / Long", "i64", "Also i128 / u128 — no BigInteger needed until huge values"],
          ["float", "f32", "Same IEEE 754"],
          ["double", "f64", "Default float type"],
          ["boolean", "bool", "One byte, true/false"],
          ["char", "char", "⚠ Java: 16-bit UTF-16 unit. Rust: 32-bit Unicode scalar — '🦀' is one char"],
          ["— (none)", "usize / isize", "Pointer-sized; all indexing uses usize"],
          ["— (none)", "u8…u128", "Real unsigned arithmetic, not Integer.toUnsignedString tricks"]
        ]
      }},
      { heading: "Declarations & literals" },
      { compare: {
        javaLabel: "Java",
        java: `<span class="kw">int</span> a = <span class="nm">42</span>;
<span class="kw">long</span> big = <span class="nm">1_000_000L</span>;
<span class="kw">double</span> pi = <span class="nm">3.14</span>;
<span class="kw">var</span> inferred = <span class="nm">42</span>;      <span class="cm">// int</span>

<span class="cm">// Cast: implicit widening,</span>
<span class="cm">// explicit narrowing</span>
<span class="kw">long</span> l = a;            <span class="cm">// ok</span>
<span class="kw">int</span> back = (<span class="kw">int</span>) l;    <span class="cm">// cast</span>`,
        rustLabel: "Rust",
        rust: `<span class="kw">let</span> a = <span class="nm">42</span>;              <span class="cm">// i32 inferred</span>
<span class="kw">let</span> big = <span class="nm">1_000_000i64</span>;  <span class="cm">// type suffix</span>
<span class="kw">let</span> pi = <span class="nm">3.14</span>;            <span class="cm">// f64 inferred</span>
<span class="kw">let</span> pi32: <span class="ty">f32</span> = <span class="nm">3.14</span>;    <span class="cm">// same literal → f32</span>
<span class="kw">let</span> b: <span class="ty">u8</span> = <span class="nm">255</span>;

<span class="cm">// NO implicit conversion, ever.</span>
<span class="cm">// Even i32 → i64 must be explicit:</span>
<span class="kw">let</span> l: <span class="ty">i64</span> = a <span class="kw">as</span> <span class="ty">i64</span>;
<span class="kw">let</span> safe: <span class="ty">i64</span> = <span class="ty">i64</span>::<span class="fn">from</span>(a); <span class="cm">// lossless</span>`
      }},
      { callout: { type: "insight", label: "Will let pi = 3.14 lose the .14?", text: "No. A literal with a decimal point is a <em>float literal</em> — it can never be inferred as an integer, so nothing is truncated. Inference only chooses <em>which</em> float type: <code>f64</code> by default (Java's <code>double</code>), or <code>f32</code> when the context demands it (<code>let x: f32 = 3.14;</code>, or the suffix <code>3.14f32</code> — Java's <code>3.14f</code>). The annotation in <code>let pi: f64 = 3.14;</code> is optional documentation, not protection. Rust is stricter than Java in the other direction too: <code>let y: f64 = 1;</code> is a compile error — Rust won't even do the implicit <em>widening</em> Java allows with <code>double d = 1;</code>. Inference picks types; it never changes values." } },
      { heading: "Overflow: silent vs. loud" },
      { compare: {
        javaLabel: "Java — wraps silently, always",
        java: `<span class="kw">int</span> max = <span class="ty">Integer</span>.MAX_VALUE;
<span class="kw">int</span> boom = max + <span class="nm">1</span>;
<span class="cm">// boom == -2147483648</span>
<span class="cm">// No warning. No error. Ever.</span>

<span class="cm">// Opt-in safety:</span>
<span class="ty">Math</span>.<span class="fn">addExact</span>(max, <span class="nm">1</span>);
<span class="cm">// throws ArithmeticException</span>`,
        rustLabel: "Rust — panics in debug, explicit otherwise",
        rust: `<span class="kw">let</span> max = <span class="ty">i32</span>::MAX;
<span class="kw">let</span> boom = max + <span class="nm">1</span>;
<span class="cm">// DEBUG build: panics immediately</span>
<span class="cm">// RELEASE build: wraps (like Java)</span>

<span class="cm">// Say what you actually mean:</span>
max.<span class="fn">checked_add</span>(<span class="nm">1</span>);    <span class="cm">// → None</span>
max.<span class="fn">wrapping_add</span>(<span class="nm">1</span>);   <span class="cm">// → i32::MIN</span>
max.<span class="fn">saturating_add</span>(<span class="nm">1</span>); <span class="cm">// → i32::MAX</span>`
      }},
      { heading: "The boxing problem that doesn't exist" },
      { compare: {
        javaLabel: "Java — the IntegerCache trap",
        java: `<span class="ty">Integer</span> a = <span class="nm">127</span>, b = <span class="nm">127</span>;
a == b;  <span class="cm">// true (cached!)</span>

<span class="ty">Integer</span> c = <span class="nm">128</span>, d = <span class="nm">128</span>;
c == d;  <span class="cm">// FALSE (new objects)</span>

<span class="cm">// Collections force boxing:</span>
<span class="ty">List</span>&lt;<span class="ty">Integer</span>&gt; xs;  <span class="cm">// can't be List&lt;int&gt;</span>
<span class="cm">// → heap allocation per element</span>`,
        rustLabel: "Rust — values are just values",
        rust: `<span class="kw">let</span> a = <span class="nm">127</span>; <span class="kw">let</span> b = <span class="nm">127</span>;
a == b;  <span class="cm">// true. Always. It's math.</span>

<span class="kw">let</span> c = <span class="nm">128</span>; <span class="kw">let</span> d = <span class="nm">128</span>;
c == d;  <span class="cm">// true. Still math.</span>

<span class="cm">// Collections hold real i32s inline:</span>
<span class="kw">let</span> xs: <span class="ty">Vec</span>&lt;<span class="ty">i32</span>&gt; = <span class="fn">vec!</span>[<span class="nm">1</span>, <span class="nm">2</span>, <span class="nm">3</span>];
<span class="cm">// contiguous memory, zero boxing</span>`
      }},
      { callout: { type: "danger", label: "char is not char", text: "Java's <code>char</code> is a UTF-16 code unit — an emoji needs two of them (a surrogate pair), and <code>\"🦀\".length()</code> is 2. Rust's <code>char</code> is a full Unicode scalar value (4 bytes): <code>'🦀'</code> is one <code>char</code>. This difference cascades into how strings work — next lesson." } },
      { callout: { type: "concept", label: "Java Mental Model", text: "Rust numeric types behave like Java primitives (copied on assignment, compared by value) but with the generics power of boxed types — <code>Vec&lt;i32&gt;</code> just works, with no autoboxing overhead and no <code>NullPointerException</code> from unboxing a null <code>Integer</code>." } }
    ],
    quiz: {
      q: "What happens when an i32 addition overflows in a Rust debug build?",
      opts: [
        { text: "It wraps around silently, like Java", correct: false },
        { text: "The program panics immediately", correct: true },
        { text: "It saturates at i32::MAX", correct: false },
        { text: "It's a compile error", correct: false }
      ],
      feedback: "Debug builds panic on overflow to surface bugs early; release builds wrap for speed (like Java always does). When overflow behavior matters, say it explicitly: <code>checked_add</code>, <code>wrapping_add</code>, or <code>saturating_add</code>."
    }
  },

  /* ---- 1.2 Strings ---- */
  {
    title: "Strings: String, &str, StringBuilder",
    eyebrow: "Types & Data · 2",
    blocks: [
      { html: "<p>Java has one string type (<code>String</code>) plus builders. Rust has <strong>two</strong> you'll use constantly: <code>String</code> (owned, growable, heap-allocated) and <code>&amp;str</code> (a borrowed <em>view</em> into string data). Both are UTF-8, not UTF-16.</p><p>The mental model: <code>String</code> is like <code>StringBuilder</code> (you own it and can mutate it), and <code>&amp;str</code> is like a read-only <code>CharSequence</code> view that costs nothing to create.</p>" },
      { table: {
        headers: ["Java", "Rust", "Notes"],
        rows: [
          ["String (immutable)", "&str", "Borrowed slice; string literals are &'static str"],
          ["StringBuilder", "String", "Owned + mutable via &mut; push_str, push"],
          ["StringBuffer", "String", "No synchronized version needed — see the Legacy Sync lesson"],
          ["s.substring(a, b)", "&s[a..b]", "Java copies; Rust returns a zero-copy view (byte indices!)"],
          ["s.charAt(i)", "s.chars().nth(i)", "No O(1) char indexing — UTF-8 is variable-width"],
          ["s.length()", "s.len() / s.chars().count()", "len() is bytes; chars().count() is characters"],
          ["String.format(...)", "format!(...)", "Compile-time checked format string"],
          ["s.split(\",\")", "s.split(',')", "Returns a lazy iterator, not an array"],
          ["s.equals(t)", "s == t", "== compares content (PartialEq), not identity"],
          ["s.isEmpty()", "s.is_empty()", ""]
        ]
      }},
      { heading: "Building & concatenating" },
      { compare: {
        javaLabel: "Java",

    <span class="kw">if</span> a.<span class="fn">len</span>() > b.<span class="fn">len</span>() { a } <span class="kw">else</span> { b }
}
<span class="cm">// Two inputs, output could borrow from</span>
<span class="cm">// either → compiler can't guess, so 'a</span>
<span class="cm">// declares: "result lives no longer</span>
<span class="cm">// than the shorter-lived input."</span>
<span class="cm">// Callers are checked against that.</span>`
      }},
      { callout: { type: "tip", label: "Good news", text: "Most functions never need annotations thanks to <em>lifetime elision</em>: one input reference → output borrows from it; methods → output borrows from <code>&amp;self</code>. Explicit <code>'a</code> shows up mainly for multi-input returns and structs that hold references." } },
      { callout: { type: "concept", label: "Java Mental Model", text: "The GC answers \"is this reference still valid?\" at runtime, continuously, with memory and CPU overhead. Lifetimes answer it once, at compile time, for free. The annotation isn't extra work the language invented — it's the cost the GC was silently paying, moved to where you can see it." } }
    ],
    quiz: {
      q: "What is the primary purpose of lifetime annotations in Rust?",
      opts: [
        { text: "To specify how long a thread should run", correct: false },
        { text: "To tell the compiler how long references are valid — preventing dangling pointers", correct: true },
        { text: "To control garbage collection timing", correct: false },
        { text: "To annotate async execution duration", correct: false }
      ],
      feedback: "Lifetimes prevent use-after-free at compile time by relating output references to input references. Java performs the equivalent check at runtime via the GC; Rust performs it once, statically, with zero runtime cost."
    }
  }
  ]
},

/* ──────────────────────── Engine ──────────────────────── */
let currentCat = 0;
let currentTopic = 0;
let done = new Set();

function flatIndex(cat, topic) {
  let idx = 0;
  for (let i = 0; i < cat; i++) idx += CATEGORIES[i].topics.length;
  return idx + topic;
}
function totalTopics() {
  return CATEGORIES.reduce((s, c) => s + c.topics.length, 0);
}

function renderTopNav() {
  const nav = document.getElementById('topNav');
  nav.innerHTML = CATEGORIES.map((c, i) =>
    '<button class="' + (i === currentCat ? 'active' : '') + '" onclick="switchCategory(' + i + ')">' + c.name + '</button>'
  ).join('');
}

function renderSidebar() {
  const el = document.getElementById('sidebarTopics');
  const cat = CATEGORIES[currentCat];
  el.innerHTML = cat.topics.map((t, i) => {
    const fi = flatIndex(currentCat, i);
    let cls = 'topic-btn';
    if (i === currentTopic) cls += ' active';
    if (done.has(fi)) cls += ' done';
    return '<button class="' + cls + '" onclick="goTopic(' + i + ')"><span class="dot"></span>' + t.title + '</button>';
  }).join('');
}

function renderProgress() {
  const total = totalTopics();
  const pct = Math.round((done.size / total) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = done.size + ' / ' + total;
}

function renderBlock(b) {
  if (b.html) return b.html;
  if (b.heading) return '<h3 class="block-heading">' + b.heading + '</h3>';
  if (b.table) {
    return '<table class="map-table"><thead><tr>' +
      b.table.headers.map(h => '<th>' + h + '</th>').join('') +
      '</tr></thead><tbody>' +
      b.table.rows.map(r => '<tr>' + r.map(c => '<td>' + c + '</td>').join('') + '</tr>').join('') +
      '</tbody></table>';
  }
  if (b.compare) {
    return '<div class="code-compare">' +
      '<div class="code-panel"><div class="code-panel-header java">☕ ' + b.compare.javaLabel + '</div><pre>' + b.compare.java + '</pre></div>' +
      '<div class="code-panel"><div class="code-panel-header rust">🦀 ' + b.compare.rustLabel + '</div><pre>' + b.compare.rust + '</pre></div>' +
      '</div>';
  }
  if (b.callout) {
    return '<div class="callout ' + b.callout.type + '"><strong>' + b.callout.label + '</strong>' + b.callout.text + '</div>';
  }
  return '';
}

function renderLesson() {
  const cat = CATEGORIES[currentCat];
  const topic = cat.topics[currentTopic];
  const content = document.getElementById('contentPane');

  const blocksHtml = topic.blocks.map(renderBlock).join('');

  const quiz = topic.quiz;
  const quizHtml = quiz ?
    '<div class="quiz" id="quiz"><div class="quiz-tag">Checkpoint</div>' +
    '<div class="quiz-q">' + quiz.q + '</div>' +
    '<div class="quiz-options">' +
    quiz.opts.map((o, i) => '<button class="quiz-opt" onclick="answerQuiz(' + i + ')">' + o.text + '</button>').join('') +
    '</div><div class="quiz-feedback" id="quizFeedback">' + quiz.feedback + '</div></div>'
    : '';

  const isFirst = currentTopic === 0 && currentCat === 0;
  const isLast = currentTopic === cat.topics.length - 1;
  const isLastCat = currentCat === CATEGORIES.length - 1;

  content.innerHTML =
    '<div class="lesson visible">' +
      '<div class="lesson-eyebrow">' + topic.eyebrow + '</div>' +
      '<h1 class="lesson-title">' + topic.title + '</h1>' +
      '<div class="lesson-body">' + blocksHtml + quizHtml + '</div>' +
      '<div class="lesson-nav">' +
        '<button class="nav-btn" onclick="prevTopic()" ' + (isFirst ? 'disabled' : '') + '>← Previous</button>' +
        '<button class="nav-btn primary" onclick="nextTopic()">' +
          (isLast && isLastCat ? '🎉 Complete!' : isLast ? 'Next Chapter →' : 'Next →') +
        '</button>' +
      '</div>' +
    '</div>';

  renderTopNav();
  renderSidebar();
  renderProgress();
}

function answerQuiz(idx) {
  const quiz = CATEGORIES[currentCat].topics[currentTopic].quiz;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.disabled = true);
  if (quiz.opts[idx].correct) {
    opts[idx].classList.add('correct');
    done.add(flatIndex(currentCat, currentTopic));
    renderSidebar();
    renderProgress();
  } else {
    opts[idx].classList.add('wrong');
    quiz.opts.forEach((o, i) => { if (o.correct) opts[i].classList.add('correct'); });
  }
  document.getElementById('quizFeedback').classList.add('show');
}

function goTopic(i) {
  currentTopic = i;
  renderLesson();
  window.scrollTo(0, 0);
}

function prevTopic() {
  if (currentTopic > 0) {
    currentTopic--;
  } else if (currentCat > 0) {
    currentCat--;
    currentTopic = CATEGORIES[currentCat].topics.length - 1;
  }
  renderLesson();
  window.scrollTo(0, 0);
}

function nextTopic() {
  const cat = CATEGORIES[currentCat];
  done.add(flatIndex(currentCat, currentTopic));
  if (currentTopic < cat.topics.length - 1) {
    currentTopic++;
  } else if (currentCat < CATEGORIES.length - 1) {
    currentCat++;
    currentTopic = 0;
  }
  renderLesson();
  window.scrollTo(0, 0);
}

function switchCategory(idx) {
  currentCat = idx;
  currentTopic = 0;
  renderLesson();
  window.scrollTo(0, 0);
}

renderLesson();
</script>
